<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>貓糧碳水化合物計算器</title>

  <style>
    body{
      font-family: "Microsoft JhengHei", sans-serif;
      background:#f5f7fb;
      padding:30px;
      color:#333;
    }

    .container{
      max-width:700px;
      margin:auto;
      background:white;
      padding:25px;
      border-radius:16px;
      box-shadow:0 4px 15px rgba(0,0,0,0.1);
    }

    h1{
      text-align:center;
      margin-bottom:25px;
    }

    .input-group{
      display:grid;
      grid-template-columns: 1fr 120px;
      gap:10px;
      margin-bottom:15px;
      align-items:center;
    }

    label{
      font-weight:bold;
    }

    input{
      padding:10px;
      border:1px solid #ccc;
      border-radius:8px;
      font-size:16px;
    }

    .result{
      margin-top:30px;
      border-top:2px solid #eee;
      padding-top:20px;
    }

    .result-item{
      display:flex;
      justify-content:space-between;
      margin-bottom:12px;
      font-size:18px;
    }

    .highlight-red{
      color:red;
      font-weight:bold;
    }

    .highlight-blue{
      color:blue;
      font-weight:bold;
    }

    .note{
      margin-top:20px;
      font-size:14px;
      color:#666;
      line-height:1.7;
      background:#fafafa;
      padding:15px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>貓糧碳水化合物計算器</h1>

  <div class="input-group">
    <label>粗蛋白 (%)</label>
    <input type="number" id="protein" step="0.1">
  </div>

  <div class="input-group">
    <label>粗脂肪 (%)</label>
    <input type="number" id="fat" step="0.1">
  </div>

  <div class="input-group">
    <label>水分 (%)</label>
    <input type="number" id="moisture" step="0.1">
  </div>

  <div class="input-group">
    <label>粗纖維 (%)</label>
    <input type="number" id="fiber" step="0.1">
  </div>

  <div class="input-group">
    <label>灰份 (%)</label>
    <input type="number" id="ash" step="0.1">
  </div>

  <div class="result">
    <div class="result-item">
      <span>碳水化合物</span>
      <span id="carb">0%</span>
    </div>

    <div class="result-item">
      <span>整體乾物重比例</span>
      <span id="dryMatter">0%</span>
    </div>

    <div class="result-item">
      <span>乾物重碳水化合物比例</span>
      <span id="dryCarb">0%</span>
    </div>

    <div class="result-item">
      <span>乾物重蛋白質</span>
      <span id="dryProtein">0%</span>
    </div>

    <div class="result-item">
      <span>乾物重脂肪</span>
      <span id="dryFat">0%</span>
    </div>
  </div>

  <div class="note">
    <strong>公式說明：</strong><br>
    碳水化合物 = 100 − 粗蛋白 − 粗脂肪 − 水分 − 粗纖維 − 灰份<br>
    整體乾物重比例 = 100 − 水分<br>
    乾物重碳水化合物比例 = 碳水化合物 ÷ 整體乾物重 × 100<br>
    乾物重蛋白質 = 粗蛋白 ÷ 整體乾物重 × 100<br>
    乾物重脂肪 = 粗脂肪 ÷ 整體乾物重 × 100
  </div>

</div>

<script>

  const inputs = document.querySelectorAll("input");

  inputs.forEach(input => {
    input.addEventListener("input", calculate);
  });

  function calculate(){

    const protein = parseFloat(document.getElementById("protein").value) || 0;
    const fat = parseFloat(document.getElementById("fat").value) || 0;
    const moisture = parseFloat(document.getElementById("moisture").value) || 0;
    const fiber = parseFloat(document.getElementById("fiber").value) || 0;
    const ash = parseFloat(document.getElementById("ash").value) || 0;

    // 碳水化合物
    let carb = 100 - protein - fat - moisture - fiber - ash;

    // 乾物重
    let dryMatter = 100 - moisture;

    // 乾物重碳水
    let dryCarb = dryMatter > 0 ? (carb / dryMatter) * 100 : 0;

    // 乾物重蛋白
    let dryProtein = dryMatter > 0 ? (protein / dryMatter) * 100 : 0;

    // 乾物重脂肪
    let dryFat = dryMatter > 0 ? (fat / dryMatter) * 100 : 0;

    // 顯示數值
    updateColorText("carb", carb);
    updateColorText("dryCarb", dryCarb);

    document.getElementById("dryMatter").innerText = dryMatter.toFixed(2) + "%";
    document.getElementById("dryProtein").innerText = dryProtein.toFixed(2) + "%";
    document.getElementById("dryFat").innerText = dryFat.toFixed(2) + "%";
  }

  function updateColorText(id, value){

    const element = document.getElementById(id);

    element.innerText = value.toFixed(2) + "%";

    if(value > 25){
      element.className = "highlight-red";
    }else{
      element.className = "highlight-blue";
    }
  }

</script>

</body>
</html>
